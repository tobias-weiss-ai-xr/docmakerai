# Forgejo workflow: CI (lint, typecheck, tests)
# Runner: Forgejo runner on legion
#
# Usage: Copy to .forgejo/workflows/ci.yml

name: CI

on:
  push:
    branches-ignore:
      - 'renovate/**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit || true
