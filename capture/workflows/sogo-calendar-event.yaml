name: "Create a Calendar Event"
description: "Learn how to create a new calendar event or appointment in SOGo's Calendar module"
base_url: "https://demo.sogo.nu/SOGo/"
steps:
  - id: "navigate-to-calendar"
    action: navigate
    url: "/SOGo/so/${SOGO_USERNAME}/Calendar/"
    description: "Navigate to the Calendar module to view your schedule and manage events"
    screenshot: true
    tip: "The Calendar view shows your events by day, week, or month — use the toggle buttons to switch views"

  - id: "click-new-event"
    action: click
    selector: "a:has-text('New Event'), button:has-text('New'), a[href*='Calendar/event'], .calendar-toolbar a:has-text('New')"
    description: "Click the New Event button to create a new calendar entry"
    screenshot: true
    wait_after: 2000
    tip: "You can also double-click on a time slot in the calendar grid to create an event at that time"

  - id: "fill-event-title"
    action: type
    selector: "input[name='title'], input[id*='title'], input[name='summary'], input[id*='summary']"
    value: "Project Review — Q2 Milestones"
    description: "Enter a descriptive title for your event. A clear title helps you identify the event at a glance in your calendar"
    screenshot: true

  - id: "set-event-date"
    action: type
    selector: "input[name='startDate'], input[id*='startDate'], input[name='start_date'], input[placeholder*='start' i]"
    value: "${EVENT_DATE}"
    description: "Set the start date for your event. SOGo supports date pickers for easy selection"
    screenshot: true

  - id: "set-event-time"
    action: type
    selector: "input[name='startTime'], input[id*='startTime'], input[name='start_time'], input[placeholder*='time' i]"
    value: "10:00"
    description: "Set the start time for the event. You can specify the time in 24-hour format"
    screenshot: true

  - id: "fill-event-description"
    action: type
    selector: "textarea[name='description'], textarea[id*='description'], .event-description textarea"
    value: "Quarterly review of project milestones.\n\nAgenda:\n- Completed deliverables review\n- Timeline adjustments\n- Resource planning for next quarter\n- Risk assessment update\n\nPlease prepare your status reports beforehand."
    description: "Add a detailed description with the agenda, location, or any preparation notes for attendees"
    screenshot: true
    tip: "You can set the event as 'All Day' for events without a specific time, like birthdays or deadlines"

  - id: "save-event"
    action: click
    selector: "button:has-text('Save'), input[value='Save'], a:has-text('Save'), button:has-text('OK')"
    description: "Click Save to create the event. SOGo will add it to your calendar and sync it via CalDAV to connected clients"
    screenshot: true
    wait_after: 3000
    tip: "The event will automatically sync to any CalDAV-enabled apps configured with your SOGo account (e.g., Outlook, Apple Calendar, Thunderbird)"

  - id: "verify-event"
    action: wait_for_selector
    selector: ".CalendarView, .calendar-grid, .fc-view, [class*='calendar'] table"
    description: "Verify the event was created by confirming you're back in the calendar view where the new event should appear"
    screenshot: true
