name: "Compose and Send an Email"
description: "Write, attach a file, and send an email in SOGo"
base_url: "${SOGO_URL}"
auth:
  username: "${SOGO_USERNAME}"
  password: "${SOGO_PASSWORD}"
steps:
  - id: goto-login
    action: navigate
    url: "${SOGO_URL}"

  - id: type-username
    action: type
    selector: "[ng-model='app.creds.username'], input[name='username']"
    value: "${SOGO_USERNAME}"

  - id: type-password
    action: type
    selector: "#passwordField, input[name='password']"
    value: "${SOGO_PASSWORD}"

  - id: toggle-remember
    action: toggle
    selector: "md-switch[ng-model='app.creds.rememberLogin']"

  - id: submit-login
    action: click
    selector: "button[type='submit']"
    wait_after: 5

  - id: open-mail
    action: click
    selector: "a[href*='Mail'], nav a:has-text('Mail')"
    wait_after: 2
    screenshot: 01-mail-inbox.png
    gif_start: true

  - id: click-compose
    action: click
    selector: "button:has-text('Compose'), a:has-text('Compose')"
    wait_after: 2
    screenshot: 02-compose-window.png

  - id: fill-to
    action: type
    selector: "input[name='to'], input[placeholder*='To']"
    value: "${SOGO_RECIPIENT}"

  - id: fill-subject
    action: type
    selector: "input[name='subject'], input[placeholder*='Subject']"
    value: "Project Update — Q2 Results"

  - id: fill-body
    action: type
    selector: "div[role='textbox'], textarea, .ProseMirror"
    value: "Hi Team,\n\nPlease find the Q2 results attached.\n\nBest,\n${SOGO_USERNAME}"

  - id: attach-file
    action: click
    selector: "button:has-text('Attach'), button[aria-label*='attach'], input[type='file']"
    wait_after: 1
    screenshot: 03-attachment.png

  - id: send-email
    action: click
    selector: "button:has-text('Send'), button:has-text('Send')"
    wait_after: 3
    screenshot: 04-message-sent.png
    gif_end: true
    gif_name: mail-compose.gif
