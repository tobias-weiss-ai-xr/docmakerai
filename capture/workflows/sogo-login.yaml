name: "Login to SOGo"
description: "Learn how to log into your SOGo webmail account and access your dashboard"
base_url: "https://demo.sogo.nu/SOGo/"
steps:
  - id: "visit-login"
    action: navigate
    url: "/SOGo/"
    description: "Navigate to the SOGo login page to begin the authentication process"
    screenshot: true
    tip: "Make sure you have your SOGo credentials ready before starting"

  - id: "enter-username"
    action: type
    selector: "#userName"
    value: "${SOGO_USERNAME}"
    description: "Enter your SOGo username into the username field. This is typically the email address or the username provided by your administrator"
    screenshot: true
    wait_after: 500

  - id: "enter-password"
    action: type
    selector: "#password"
    value: "${SOGO_PASSWORD}"
    description: "Enter your password securely. SOGo encrypts the password during transmission"
    screenshot: false

  - id: "click-login"
    action: click
    selector: "input[type='submit']"
    description: "Click the Login button to submit your credentials. SOGo will authenticate you against the configured backend (LDAP, SQL, etc.)"
    screenshot: true
    wait_after: 3000
    tip: "If login fails, check that Caps Lock is off and you're using the correct credentials from your administrator"

  - id: "verify-dashboard"
    action: wait_for_selector
    selector: ".app-navigation, .module-navigation, .so-nav-main, nav[role='navigation']"
    description: "After successful login, you'll see the SOGo main dashboard with the application navigation sidebar. This confirms you're authenticated"
    screenshot: true
    tip: "The dashboard shows your mailboxes, calendars, and address books in the sidebar"
