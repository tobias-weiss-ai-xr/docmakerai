name: "Create a Calendar Event"
description: "Create a new event with attendees and a reminder in SOGo calendar"
base_url: "${SOGO_URL}"
auth:
  username: "${SOGO_USERNAME}"
  password: "${SOGO_PASSWORD}"
steps:
  - id: goto-login
    action: navigate
    url: "${SOGO_URL}"
    screenshot: 01-login-page.png

  - id: type-username
    action: type
    selector: "[ng-model='app.creds.username'], input[name='username']"
    value: "${SOGO_USERNAME}"

  - id: type-password
    action: type
    selector: "#passwordField, input[name='password']"
    value: "${SOGO_PASSWORD}"

  - id: submit-login
    action: click
    selector: "button[type='submit']"
    wait_after: 5
    screenshot: 02-dashboard.png

  - id: open-calendar
    action: click
    selector: "a[href*='Calendar'], nav a:has-text('Calendar')"
    wait_after: 2
    screenshot: 03-calendar-view.png
    gif_start: true

  - id: click-new-event
    action: click
    selector: "button:has-text('New'), button:has-text('+'), .btn-new-event"
    wait_after: 1
    screenshot: 04-new-event-dialog.png

  - id: fill-title
    action: type
    selector: "input[name='title'], input[id*='title'], input[placeholder*='Title']"
    value: "Team Standup"

  - id: set-date
    action: type
    selector: "input[name='startDate'], input[placeholder*='Start']"
    value: "${EVENT_DATE}"

  - id: set-time
    action: type
    selector: "input[name='startTime'], input[placeholder*='Time']"
    value: "10:00"

  - id: set-end-time
    action: type
    selector: "input[name='endTime'], input[placeholder*='End']"
    value: "11:00"

  - id: add-attendee
    action: type
    selector: "input[placeholder*='Attendee'], input[placeholder*='attendee']"
    value: "${SOGO_RECIPIENT}"
    wait_after: 1

  - id: set-alarm
    action: click
    selector: "button:has-text('Alarm'), button:has-text('Reminder'), label:has-text('Reminder')"
    wait_after: 1
    screenshot: 05-alarm-settings.png

  - id: save-event
    action: click
    selector: "button:has-text('Save'), button:has-text('OK'), input[value='Save']"
    wait_after: 2
    screenshot: 06-event-created.png
    gif_end: true
    gif_name: calendar-create-event.gif
