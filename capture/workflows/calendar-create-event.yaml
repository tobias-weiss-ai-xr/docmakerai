name: "Create a Calendar Event"
description: "Create a new event with attendees and a reminder in SOGo calendar"
base_url: "${SOGO_URL}"
auth:
  username: "${SOGO_USERNAME}"
  password: "${SOGO_PASSWORD}"
steps:
  - id: goto-login
    action: navigate
    url: "${SOGO_URL}"
    screenshot: 01-login-page.png

  - id: type-username
    action: type
    selector: "[ng-model='app.creds.username']"
    value: "${SOGO_USERNAME}"

  - id: type-password
    action: type
    selector: "#passwordField"
    value: "${SOGO_PASSWORD}"

  - id: toggle-remember
    action: toggle
    selector: "md-switch[ng-model='app.creds.rememberLogin']"

  - id: submit-login
    action: click
    selector: "button[type='submit']"
    wait_after: 5
    screenshot: 02-dashboard.png

  - id: open-calendar
    action: navigate
    url: "${SOGO_URL}so/testuser/Calendar/view"
    wait_after: 3
    screenshot: 03-calendar-view.png
    gif_start: true

  - id: dblclick-create-event
    action: dblclick
    selector: "div.day.weekEndDay div.day"
    wait_after: 2
    screenshot: 04-new-event-dialog.png

  - id: fill-title
    action: type
    selector: "[ng-model='editor.component.summary']"
    value: "Team Standup"

  - id: fill-location
    action: type
    selector: "[ng-model='editor.component.location']"
    value: "Conference Room B"

  - id: set-alarm
    action: click
    selector: "button[ng-click*='toggleAlarm']"
    wait_after: 1
    screenshot: 05-alarm-settings.png

  - id: save-event
    action: click
    selector: "button[type='submit']:has-text('Save')"
    wait_after: 3
    screenshot: 06-event-created.png
    gif_end: true
    gif_name: calendar-create-event.gif
