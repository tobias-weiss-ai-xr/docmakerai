name: "Compose and Send an Email"
description: "Learn how to compose a new email message and send it from your SOGo webmail account"
base_url: "https://demo.sogo.nu/SOGo/"
steps:
  - id: "navigate-to-mail"
    action: navigate
    url: "/SOGo/so/${SOGO_USERNAME}/MailView/"
    description: "Navigate to the Mail module to access your inbox and email management features"
    screenshot: true
    tip: "You can also click 'Mail' in the sidebar navigation from any page"

  - id: "click-compose"
    action: click
    selector: "a[href*='MailPart/compose'], button:has-text('Compose'), a:has-text('New'), .mail-toolbar a:has-text('Write')"
    description: "Click the Compose button to open a new message composition window"
    screenshot: true
    wait_after: 2000
    tip: "The Compose button is typically located in the top toolbar of the Mail view"

  - id: "fill-to-field"
    action: type
    selector: "input[name='to'], input[id*='to'], input[id*='recipient'], .compose-field-to input"
    value: "${SOGO_RECIPIENT}"
    description: "Enter the recipient's email address in the 'To' field. You can add multiple recipients by separating addresses with commas"
    screenshot: true
    tip: "SOGo also supports auto-completion from your address book as you type"

  - id: "fill-subject"
    action: type
    selector: "input[name='subject'], input[id*='subject']"
    value: "Meeting Tomorrow — Agenda and Preparations"
    description: "Enter a clear and descriptive subject line. A good subject helps the recipient understand the email's purpose at a glance"
    screenshot: true

  - id: "fill-body"
    action: type
    selector: "#content, iframe[id*='content'], .compose-body, textarea[name='body']"
    value: "Hi everyone,\n\nI'd like to schedule a meeting for tomorrow to discuss the project roadmap. Please find the agenda below:\n\n1. Review current progress\n2. Discuss upcoming milestones\n3. Assign action items\n\nBest regards"
    description: "Write your email message in the body editor. SOGo provides a rich text editor with formatting options like bold, italic, and bullet points"
    screenshot: true
    tip: "You can use the formatting toolbar to style your email with headings, lists, and emphasis"

  - id: "click-send"
    action: click
    selector: "button:has-text('Send'), input[value='Send'], a:has-text('Send'), .compose-toolbar a:has-text('Send')"
    description: "Click the Send button to deliver your email. SOGo will submit the message through the configured mail transfer agent"
    screenshot: true
    wait_after: 3000
    tip: "After sending, you'll be returned to your inbox where you can see the sent message in your 'Sent' folder"

  - id: "verify-sent"
    action: wait_for_selector
    selector: ".MailView, .mail-list, .message-list, [class*='mail'] table"
    description: "Verify the email was sent successfully by confirming you're back in the mailbox view"
    screenshot: true
