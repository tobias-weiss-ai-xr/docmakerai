name: "Add a New Contact"
description: "Learn how to add a new contact to your SOGo address book for easy access to important people"
base_url: "https://demo.sogo.nu/SOGo/"
steps:
  - id: "navigate-to-contacts"
    action: navigate
    url: "/SOGo/so/${SOGO_USERNAME}/Contacts/"
    description: "Navigate to the Address Book module to view and manage your contacts"
    screenshot: true
    tip: "SOGo supports multiple address books — personal, shared, and system-wide directories"

  - id: "click-new-contact"
    action: click
    selector: "a:has-text('New Contact'), button:has-text('New'), a[href*='Contacts/new'], .contacts-toolbar a:has-text('New')"
    description: "Click the New Contact button to open a blank contact form"
    screenshot: true
    wait_after: 2000
    tip: "You can also import contacts in bulk using vCard (.vcf) files via the Import function"

  - id: "fill-first-name"
    action: type
    selector: "input[name='firstname'], input[id*='firstname'], input[name='firstName'], input[id*='firstName']"
    value: "Jane"
    description: "Enter the contact's first name. This field is required for saving the contact"
    screenshot: true

  - id: "fill-last-name"
    action: type
    selector: "input[name='lastname'], input[id*='lastname'], input[name='lastName'], input[id*='lastName']"
    value: "Doe"
    description: "Enter the contact's last name. Together with the first name, this forms the contact's display name"
    screenshot: true

  - id: "fill-email"
    action: type
    selector: "input[name='email'], input[id*='email'], input[type='email']"
    value: "jane.doe@example.com"
    description: "Enter the contact's email address. You can add multiple email addresses using the 'Add Email' option"
    screenshot: true
    tip: "You can mark an email address as 'Work' or 'Home' using the dropdown next to the field"

  - id: "fill-phone"
    action: type
    selector: "input[name='phone'], input[id*='phone'], input[name='telephone'], input[id*='telephone']"
    value: "+1-555-0123"
    description: "Enter the contact's phone number. SOGo supports multiple phone types: work, home, mobile, and fax"
    screenshot: true

  - id: "fill-company"
    action: type
    selector: "input[name='company'], input[id*='company'], input[name='organization'], input[id*='organization']"
    value: "Acme Corporation"
    description: "Enter the company or organization name. This helps when searching for contacts by organization"
    screenshot: true
    tip: "If your SOGo setup uses LDAP directories, you may also have access to a global address book"

  - id: "save-contact"
    action: click
    selector: "button:has-text('Save'), input[value='Save'], a:has-text('Save'), button:has-text('OK')"
    description: "Click Save to store the contact in your address book. SOGo syncs contacts via CardDAV to connected clients"
    screenshot: true
    wait_after: 3000
    tip: "Saved contacts are available across all devices that connect to your SOGo account via CardDAV"

  - id: "verify-contact"
    action: wait_for_selector
    selector: ".ContactsView, .contact-list, .addressbook-list, [class*='contact'] table"
    description: "Verify the contact was created by confirming you're back in the address book list view"
    screenshot: true
