name: Preview Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number || 'manual' }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build & Upload Preview
    runs-on: [self-hosted, linux, preview]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-preview-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-preview-
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline || npm install

      - name: Build (English only for preview speed)
        run: npm run build -- --locale en

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-pr-${{ github.event.number || 'manual' }}
          path: site/build/
          retention-days: 7
          compression-level: 9

      - name: Comment artifact available on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const comment = `### 🔍 Preview Build Complete

            The preview build for this PR has finished successfully.

            - **Branch:** \`${{ github.head_ref }}\`
            - **Commit:** \`${{ github.sha.slice(0, 7) }}\`
            - **Artifact:** \`preview-build-pr-${{ github.event.number || 'manual' }}\`

            > A staging server is not yet configured. Download the artifact from the workflow run to inspect the build locally.

            *Build finished at: ${new Date().toISOString()}*
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
