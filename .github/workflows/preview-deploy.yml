name: Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number || 'manual' }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Build & Deploy Preview
    runs-on: [self-hosted, linux, preview]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-preview-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-preview-
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline || npm install

      - name: Build with preview baseUrl
        run: |
          PR_NUMBER="${{ github.event.number || 'manual' }}"
          PREVIEW_BASE="/docmakerai/preview/pr-${PR_NUMBER}/"
          echo "Building with baseUrl: ${PREVIEW_BASE}"
          npm run build -- --baseUrl "${PREVIEW_BASE}" --locale en

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/build
          destination_dir: preview/pr-${{ github.event.number || 'manual' }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `https://tobias-weiss-ai-xr.github.io/docmakerai/preview/pr-${prNumber}/`;
            const comment = `### 🔍 Preview Deployed

            Your PR preview is ready at:

            **${previewUrl}**

            | Detail | Value |
            |--------|-------|
            | Branch | \`${{ github.head_ref }}\` |
            | Commit | \`${context.sha.slice(0, 7)}\` |
            | Base URL | \`/docmakerai/preview/pr-${prNumber}/\` |

            > This preview updates automatically on each push to this PR.
            > It will be cleaned up when the PR is closed.
            `;

            // Find and update existing preview comment, or create new one
            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const previewComment = comments.data.find(c =>
              c.body && c.body.includes('### 🔍 Preview Deployed')
            );

            if (previewComment) {
              await github.rest.issues.updateComment({
                comment_id: previewComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }
