name: Preview Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup-preview:
    name: Remove preview deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Delete preview directory
        run: |
          PR_NUMBER=${{ github.event.number }}
          PREVIEW_DIR="preview/pr-${PR_NUMBER}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            echo "Deleted preview directory: $PREVIEW_DIR"
          else
            echo "No preview directory found: $PREVIEW_DIR"
          fi

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: clean up preview for PR #${{ github.event.number }}"
          git push
