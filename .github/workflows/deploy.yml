name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect critical changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            deploy:
              - 'site/docs/**'
              - 'site/src/**'
              - 'site/static/**'
              - 'site/docusaurus.config.ts'
              - 'site/sidebars.ts'
              - 'site/package.json'
              - 'site/package-lock.json'
              - '.github/workflows/deploy.yml'

  build:
    name: Build site
    runs-on: [self-hosted, linux]
    needs: detect-changes
    if: needs.detect-changes.outputs.should_deploy == 'true'
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci || npm install

      - name: Build Docusaurus (all locales)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: site/build/
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: [detect-changes, build]
    runs-on: [self-hosted, linux]
    if: needs.detect-changes.outputs.should_deploy == 'true' && success()
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: site/build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/build
          cname: docs.docmakerai.com

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://docs.docmakerai.com',
              description: 'Deployed to GitHub Pages',
              context: 'deployment/production'
            })

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              target_url: 'https://github.com/tobias-weiss-ai-xr/docmakerai/actions/runs/' + context.runId,
              description: 'Deployment failed',
              context: 'deployment/production'
            });

  skip-deploy:
    name: Skip deployment (no critical changes)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_deploy == 'false'
    steps:
      - name: Show skipped changes
        run: |
          echo "::notice::Skipping deployment — no critical changes detected."
          echo "Only documentation updates, README, or non-site files were changed."
          echo "To force deployment, modify: site/docs/**, site/src/**, site/docusaurus.config.ts"
