name: SOGo Change Detection

on:
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect-changes:
    name: Detect SOGo UI drift
    runs-on: [self-hosted, linux, ci]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages --quiet \
            -r capture/requirements.txt

      - name: Install Playwright browser
        run: python3 -m playwright install --with-deps chromium

      - name: Run capture pipeline (login screenshots only)
        env:
          SOGO_URL: https://demo.sogo.nu/SOGo/
          SOGO_USERNAME: ${{ secrets.SOGO_DEMO_USERNAME }}
          SOGO_PASSWORD: ${{ secrets.SOGO_DEMO_PASSWORD }}
        run: |
          python3 capture/capture.py --all --only-login || true

      - name: Compare against baselines
        id: drift
        run: |
          DRIFTED=()
          for f in capture/screenshots/*/login.png; do
            [ -f "$f" ] || continue
            wf=$(basename "$(dirname "$f")")
            if ! python3 capture/detect_changes.py "$f" \
                --workflow "$wf" --check-drift; then
              DRIFTED+=("$wf")
            fi
          done
          if [ ${#DRIFTED[@]} -gt 0 ]; then
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${DRIFTED[@]}" > drifted-workflows.txt
          else
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post issue if drift detected
        if: steps.drift.outputs.drifted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const workflows = fs.readFileSync('drifted-workflows.txt', 'utf8')
              .trim().split('\n').filter(Boolean);
            const title = `SOGo UI drift detected — ${workflows.length} workflow(s) may need re-capture (${new Date().toISOString().slice(0,10)})`;
            const body = `## SOGo UI Drift Detected\n\n` +
              `The nightly change-detection job found that ${workflows.length} workflow(s) ` +
              `now differ from their stored baseline by more than the perceptual-hash threshold.\n\n` +
              `### Affected workflows\n\n` +
              workflows.map(w => `- \`${w}\``).join('\n') + `\n\n` +
              `### What this means\n\n` +
              `The SOGo demo site UI may have changed (new layout, new theme, new component). ` +
              `Our existing captures and documentation may now be stale.\n\n` +
              `### Recommended actions\n\n` +
              `1. Manually verify each affected workflow against https://demo.sogo.nu/SOGo/\n` +
              `2. If the UI genuinely changed, re-run \`python3 capture/capture.py --all\`\n` +
              `3. The baselines will be updated automatically when the capture succeeds\n` +
              `4. Update any affected documentation pages\n\n` +
              `### How detection works\n\n` +
              `See \`capture/detect_changes.py\` and the ROADMAP entry for Sprint 11.\n\n` +
              `---\n` +
              `*Auto-generated by \`.github/workflows/change-detection.yml\`*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['drift-detected', 'documentation']
            });
