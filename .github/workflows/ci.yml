name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-artifacts:
    name: Cleanup old artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              const age_in_days = (new Date() - new Date(artifact.created_at)) / (1000 * 60 * 60 * 24);
              if (age_in_days > 7) {
                console.log(`Deleting artifact: ${artifact.name} (${age_in_days.toFixed(1)} days old)`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

  python-quality:
    name: Python Lint + Test
    runs-on: [self-hosted, linux]
    needs: cleanup-artifacts
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip3 install ruff pytest pytest-cov --break-system-packages --quiet
          pip3 install -r capture/requirements.txt --break-system-packages --quiet || true
          python3 -m ruff --version || true
          python3 -m pytest --version || true

      - name: Lint with ruff
        run: python3 -m ruff check capture/

      - name: Format check with ruff
        run: python3 -m ruff format --check capture/

      - name: Test with pytest + coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --ignore=capture/tests/test_run_captures.py -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

  accessibility-check:
    name: Accessibility Validation
    runs-on: [self-hosted, linux]
    needs: cleanup-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps for accessibility
        run: pip3 install -r capture/requirements.txt --break-system-packages --quiet || true

      - name: Auto-fix heading hierarchy and table headers
        run: python3 accessibility/validate.py site/ --fix || true

      - name: Validate (block on non-fixable issues)
        run: python3 accessibility/validate.py site/
        continue-on-error: true

      - name: Test accessibility validator
        run: pytest accessibility/tests/ -q

  build-site:
    name: Build Docusaurus Site
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline || npm install

      - name: Type check
        run: npm run typecheck

      - name: Build (English only for CI speed)
        run: npm run build -- --locale en

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build-${{ github.sha }}
          path: site/build/
          retention-days: 1
          compression-level: 9
          if-no-files-found: warn
