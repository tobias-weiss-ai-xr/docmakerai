name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-artifacts:
    name: Cleanup old artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              const age_in_days = (new Date() - new Date(artifact.created_at)) / (1000 * 60 * 60 * 24);
              if (age_in_days > 7) {
                console.log(`Deleting artifact: ${artifact.name} (${age_in_days.toFixed(1)} days old)`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

  python-quality:
    name: Python Lint + Test
    runs-on: [self-hosted, linux, ci]
    needs: cleanup-artifacts
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('capture/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip3 install ruff pytest pytest-cov --break-system-packages --quiet
          pip3 install -r capture/requirements.txt --break-system-packages --quiet || true
          python3 -m ruff --version || true
          python3 -m pytest --version || true

      - name: Lint with ruff
        run: python3 -m ruff check capture/

      - name: Format check with ruff
        run: python3 -m ruff format --check capture/

      - name: Test with pytest + coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify test results
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status === 'success' ? 'success' : 'failure',
              description: `Python tests: ${status}`,
              context: 'ci/python-tests'
            });

  accessibility-check:
    name: Accessibility Validation
    runs-on: [self-hosted, linux, ci]
    needs: cleanup-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps for accessibility
        run: pip3 install -r capture/requirements.txt --break-system-packages --quiet || true

      - name: Auto-fix heading hierarchy and table headers
        run: python3 accessibility/validate.py site/ --fix || true

      - name: Validate (block on non-fixable issues)
        run: python3 accessibility/validate.py site/
        continue-on-error: true

      - name: Test accessibility validator
        run: pytest accessibility/tests/ -q

  coverage-guard:
    name: Coverage Trend Guard
    runs-on: [self-hosted, linux, ci]
    needs: python-quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage-pr/

      - name: Fetch baseline coverage from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p coverage-base
          # Get the SHA of the latest commit on main
          MAIN_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq .object.sha)
          echo "Latest main SHA: $MAIN_SHA"
          # Find the most recent successful CI run for that SHA
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$MAIN_SHA&status=success&per_page=10" \
            --jq '.workflow_runs[] | select(.name == "CI") | .id' | head -1)
          if [ -n "$RUN_ID" ]; then
            echo "Found baseline run: $RUN_ID"
            gh run download "$RUN_ID" --name "coverage-report-$MAIN_SHA" --dir coverage-base/ \
              || echo "::warning::Could not download coverage for $MAIN_SHA, skipping guard"
          else
            echo "::notice::No successful CI run found for $MAIN_SHA, skipping guard (first PR on repo?)"
          fi

      - name: Run coverage guard
        if: hashFiles('coverage-base/coverage.xml') != ''
        run: |
          python3 scripts/check_coverage_trend.py \
            --baseline coverage-base/coverage.xml \
            --pr coverage-pr/coverage.xml \
            --max-drop 0.5

  build-site:
    name: Build Docusaurus Site
    runs-on: [self-hosted, linux, ci]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline || npm install

      - name: Type check
        run: npm run typecheck

      - name: Build (English only for CI speed)
        run: npm run build -- --locale en

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build-${{ github.sha }}
          path: site/build/
          retention-days: 1
          compression-level: 9
          if-no-files-found: warn

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI against live site
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

  bundle-size:
    name: Bundle Size Budget
    runs-on: [self-hosted, linux, ci]
    needs: build-site
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build-${{ github.sha }}
          path: site/build/

      - name: Check bundle size budgets
        run: |
          set -euo pipefail
          # Budgets (gzip, in bytes)
          JS_BUDGET=$((500 * 1024))
          CSS_BUDGET=$((100 * 1024))
          CHUNK_BUDGET=$((200 * 1024))

          # Calculate gzip sizes
          js_total=$(find site/build/assets/js -name '*.js' -exec cat {} + 2>/dev/null | gzip -9 | wc -c)
          css_total=$(find site/build/assets/css -name '*.css' -exec cat {} + 2>/dev/null | gzip -9 | wc -c)
          largest_chunk=$(find site/build/assets/js -name '*.js' -exec stat -c '%s' {} + 2>/dev/null | sort -n | tail -1)

          echo "JS total (gzip): $js_total bytes (budget: $JS_BUDGET)"
          echo "CSS total (gzip): $css_total bytes (budget: $CSS_BUDGET)"
          echo "Largest JS chunk: $largest_chunk bytes (budget: $CHUNK_BUDGET)"

          # Write summary for the PR comment step
          cat > bundle-summary.txt <<EOF
          js_total_bytes=$js_total
          css_total_bytes=$css_total
          largest_chunk_bytes=$largest_chunk
          EOF

          failed=0
          [ "$js_total" -le "$JS_BUDGET" ] || { echo "::error::JS bundle exceeds 500KB"; failed=1; }
          [ "$css_total" -le "$CSS_BUDGET" ] || { echo "::error::CSS bundle exceeds 100KB"; failed=1; }
          [ "$largest_chunk" -le "$CHUNK_BUDGET" ] || { echo "::error::Largest JS chunk exceeds 200KB"; failed=1; }
          exit $failed

      - name: Comment size on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('bundle-summary.txt', 'utf8');
            const data = Object.fromEntries(
              raw.trim().split('\n').map(l => l.split('='))
            );
            const fmt = (bytes) => (bytes / 1024).toFixed(1) + ' KB';
            const body = `### Bundle Size\n\n` +
              `- **JS total (gzip):** ${fmt(data.js_total_bytes)} (budget: 500 KB)\n` +
              `- **CSS total (gzip):** ${fmt(data.css_total_bytes)} (budget: 100 KB)\n` +
              `- **Largest JS chunk:** ${fmt(data.largest_chunk_bytes)} (budget: 200 KB)\n\n` +
              `_Updated: ${new Date().toISOString()}_`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
