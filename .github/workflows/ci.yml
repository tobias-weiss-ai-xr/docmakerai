name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install -r capture/requirements.txt || true

      - name: Lint with ruff
        run: ruff check capture/

      - name: Format check with ruff
        run: ruff format --check capture/

      - name: Test with pytest + coverage
        run: |
          pytest capture/tests/ --cov=capture --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  accessibility-check:
    name: Accessibility Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run accessibility validator
        run: python3 accessibility/validate.py site/docs

  build-site:
    name: Build Docusaurus Site
    runs-on: ubuntu-latest
    needs: [python-quality]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npm run typecheck

      - name: Build (English + German)
        run: npm run build -- --locale en && npm run build -- --locale de

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: site/build/
          retention-days: 3
