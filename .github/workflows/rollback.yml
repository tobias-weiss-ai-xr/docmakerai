name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit SHA to rollback to (leave empty for previous deployment)'
        required: false
      reason:
        description: 'Reason for rollback'
        required: true

permissions:
  contents: write

jobs:
  rollback:
    name: Rollback to previous deployment
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous success commit
        id: previous-commit
        if: github.event.inputs.target_commit == ''
        run: |
          PREVIOUS=$(git log --pretty=format:'%H' --since="2 months ago" --all --first-parent main --grep="deployment" --grep="deploy" -i | head -2 | tail -1)
          if [ -z "$PREVIOUS" ]; then
            PREVIOUS=$(git log --pretty=format:'%H' --since="2 months ago" --first-parent main | head -2 | tail -1)
          fi
          echo "commit_sha=$PREVIOUS" >> $GITHUB_OUTPUT
          echo "Rolling back to: $PREVIOUS"

      - name: Set commit to rollback
        id: commit-sha
        run: |
          if [ -n "${{ github.event.inputs.target_commit }}" ]; then
            echo "sha=${{ github.event.inputs.target_commit }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ steps.previous-commit.outputs.commit_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.commit-sha.outputs.sha }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-cache
        with:
          path: site/node_modules
          key: ${{ runner.os }}-node-${{ steps.commit-sha.outputs.sha }}-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          cd site
          npm ci --prefer-offline || npm install

      - name: Build Docusaurus
        run: |
          cd site
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/build
          cname: docs.docmakerai.com
          force_orphan: true

      - name: Notify rollback success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const reason = '${{ github.event.inputs.reason }}';
            const commit = '${{ steps.commit-sha.outputs.sha }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://docs.docmakerai.com',
              description: `Rollback completed: ${reason.substring(0, 30)}...`,
              context: 'rollback/production'
            });

      - name: Create issue for rollback
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const reason = '${{ github.event.inputs.reason }}';
            const commit = '${{ steps.commit-sha.outputs.sha }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Rollback completed - ${new Date().toISOString().slice(0, 10)}`,
              body: `## Rollback Summary

            **Committer:** @${{ github.actor }}
            **Reason:** ${reason}
            **Previous Commit:** \`${commit.substring(0, 8)}\`
            **Current Commit:** \`${{ github.sha.substring(0, 8) }}\`

            ## Actions

            This rollback was triggered manually. Please investigate the cause of the rollout issue and create a fix.

            ## Next Steps

            1. Review the rollback site at https://docs.docmakerai.com
            2. Identify root cause of the deployment failure
            3. Fix the issue and create a new PR
            4. Test thoroughly before deploying
            `
            });
