<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#dots)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="160" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="350" r="120" fill="rgba(255,255,255,0.02)"/>

  <!-- Title -->
  <text x="600" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#title)" text-anchor="middle" letter-spacing="-1">DocMaker AI</text>
  <text x="600" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Automated Screenshot Capture Pipeline + Docusaurus Documentation Site</text>

  <!-- Workflow Nodes -->
  <!-- Step 1: Capture -->
  <g>
    <rect x="120" y="180" width="260" height="140" rx="14" fill="url(#card1)" opacity="0.95"/>
    <rect x="120" y="180" width="260" height="140" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Icon area -->
    <circle cx="250" cy="230" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="250" y="238" font-family="system-ui, sans-serif" font-size="22" fill="white" text-anchor="middle">🎬</text>

    <text x="250" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Capture</text>
    <text x="250" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">Playwright records UI interactions</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="380" y1="250" x2="440" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Annotate -->
  <g>
    <rect x="470" y="180" width="260" height="140" rx="14" fill="url(#card2)" opacity="0.95"/>
    <rect x="470" y="180" width="260" height="140" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <circle cx="600" cy="230" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="600" y="238" font-family="system-ui, sans-serif" font-size="22" fill="white" text-anchor="middle">🎨</text>

    <text x="600" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Annotate</text>
    <text x="600" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">Pillow overlays step headers + cues</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="730" y1="250" x2="790" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Deploy -->
  <g>
    <rect x="820" y="180" width="260" height="140" rx="14" fill="url(#card3)" opacity="0.95"/>
    <rect x="820" y="180" width="260" height="140" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <circle cx="950" cy="230" r="28" fill="rgba(255,255,255,0.15)"/>
    <text x="950" y="238" font-family="system-ui, sans-serif" font-size="22" fill="white" text-anchor="middle">🚀</text>

    <text x="950" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Deploy</text>
    <text x="950" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">GitHub Pages + Docusaurus site</text>
  </g>

  <!-- Bottom info bar -->
  <rect x="200" y="350" width="800" height="32" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="371" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Built with Python 3.11 · Playwright · Pillow · ffmpeg · Docusaurus 3.10.1 · OpenSpec</text>
</svg>
