[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM"]
ignore = ["B904", "SIM117"]

[tool.ruff.lint.per-file-ignores]
"capture/tests/*" = ["B", "SIM", "UP006", "UP007"]
"capture/run_captures.py" = ["F401", "E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["capture/tests"]
pythonpath = [".."]

[tool.coverage.run]
source = ["capture"]
omit = ["capture/tests/*", "capture/__init__.py"]

[tool.coverage.report]
fail_under = 55
show_missing = true
